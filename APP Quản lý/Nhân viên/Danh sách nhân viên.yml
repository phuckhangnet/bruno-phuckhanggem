info:
  name: Danh sách nhân viên
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/Employee/Admin/DanhSachNhanVien"
  headers:
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
       "IdCuaHang":0,
        "IdVaiTro":1,
        "IsLock":false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
