info:
  name: Reset pass nhân viên
  type: http
  seq: 3

http:
  method: POST
  url: "{{url}}/Employee/Admin/ResetPasswordStaff"
  headers:
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
        "IdNguoiDung":51,
        "MatKhauMoi":"123456"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
