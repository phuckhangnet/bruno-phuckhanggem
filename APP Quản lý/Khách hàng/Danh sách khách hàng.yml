info:
  name: Danh sách khách hàng
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/Customer/DanhSachKhachHang"
  headers:
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
        "searchTerm": "0979127799",
        "status": "ACTIVE", //ACTIVE | LOCK
        "pageNumber": 1,
        "pageSize": 500,
        "shortBy":"",// created_date, firstname, lastname
        "isAscending":true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
