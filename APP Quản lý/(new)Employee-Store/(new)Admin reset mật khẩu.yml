info:
  name: (new)Admin reset mật khẩu
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/Employee/DatLaiMatKhau"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
          "taiKhoanReset":"hauphvn",
          "idNguoiTao": 0,
           "isAutoSendEmail": true
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
