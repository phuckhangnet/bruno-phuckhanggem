info:
  name: Báo cáo kho theo ngày POST
  type: http
  seq: 3

http:
  method: POST
  url: "{{url}}/Report/BaoCaoKhoHangTheoNgay"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
  params:
    - name: storeId
      value: "0"
      type: query
      disabled: true
  body:
    type: json
    data: |-
      {
        "idNguoiDung": 110,
        "tuNgay": "2022-01-13",
        "denNgay": "2024-12-14"
      //   "storeId": "0,1"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
