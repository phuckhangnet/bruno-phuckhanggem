  seq: 2

http:
  method: POST
  url: "{{url}}/HenNgayXuLyDon/TaoMoiLichXuLy"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
  body:
    type: json
    data: |-
      {
        "IdDonHangs": [
          4324
        ],
        "StartDate": "2026-03-20",
        "EndDate": "2026-04-21",
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

