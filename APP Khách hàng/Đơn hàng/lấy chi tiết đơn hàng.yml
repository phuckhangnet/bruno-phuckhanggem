info:
  name: lấy chi tiết đơn hàng
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/customer/don-hang/chi-tiet"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
          "idDonHang":1
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
