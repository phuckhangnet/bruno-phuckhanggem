info:
  name: khoá/mở trạng thái khách hàng
  type: http
  seq: 6

http:
  method: POST
  url: "{{url}}/customer/status"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |+
      {
      "idKhachHang":1011,
      "isLock":false
      }

  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
